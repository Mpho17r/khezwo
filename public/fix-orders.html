<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Order Numbers - KheZwo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .error { color: #c33; background: #fee; padding: 10px; border-radius: 8px; margin: 10px 0; }
        pre { text-align: left; background: #f5f5f5; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
        h1 { margin-bottom: 20px; }
        p { margin-bottom: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔧 Fix Order Numbers</h1>
        <p>Click the button below to reset all order numbers to sequential format (001, 002, 003...) per vendor.</p>
        <button onclick="fixOrders()">Fix Order Numbers</button>
        <div id="result"></div>
    </div>
    <script>
        async function fixOrders() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="success">Processing...</div>';
            
            try {
                const response = await fetch('/api/fix-order-numbers');
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<div class="success">✅ ${data.message}</div><pre>${data.details || ''}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
