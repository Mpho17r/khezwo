<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - KheZwo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            transition: all 0.3s;
            z-index: 100;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
        }
        
        .sidebar-header { padding: 30px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar-header .logo { font-size: 24px; font-weight: 800; }
        .sidebar-header .logo span { color: #667eea; }
        .sidebar-header .business-name { font-size: 14px; opacity: 0.7; margin-top: 10px; }
        
        .nav-item {
            padding: 14px 25px;
            margin: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            transition: all 0.3s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: #667eea; color: white; box-shadow: 0 5px 15px rgba(102,126,234,0.3); }
        .nav-item i { width: 24px; font-size: 18px; }
        
        .logout-btn {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 15px;
            padding: 14px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
        }
        .logout-btn:hover { background: rgba(255,255,255,0.2); color: white; }
        
        .main-content { margin-left: 280px; padding: 30px 40px; min-height: 100vh; }
        
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 32px; font-weight: 700; color: #1a1a2e; }
        .page-header p { color: #666; margin-top: 8px; }
        
        .orders-container { display: flex; flex-direction: column; gap: 16px; }
        .order-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border-left: 4px solid #ff9800;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .order-number { font-size: 18px; font-weight: 700; color: #ff9800; }
        .order-time { color: #888; font-size: 13px; }
        .order-customer { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
        .order-items { background: #f8f9fa; border-radius: 12px; padding: 12px; margin: 12px 0; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e9ecef; }
        .order-total { text-align: right; font-size: 18px; font-weight: 700; margin: 15px 0 10px; padding-top: 10px; border-top: 2px solid #f0f0f0; }
        
        /* Status Buttons */
        .status-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .status-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-btn:hover { transform: translateY(-2px); }
        .status-btn.active { background: #4caf50; color: white; }
        
        .empty-state { text-align: center; padding: 60px; background: white; border-radius: 20px; }
        .empty-state i { font-size: 64px; color: #ccc; margin-bottom: 20px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .alert { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; z-index: 1000; display: none; }
        .alert-success { background: #4caf50; color: white; }
        .alert-error { background: #f44336; color: white; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .menu-item-card { background: white; border-radius: 16px; overflow: hidden; }
        .menu-item-image { height: 160px; background-size: cover; background-position: center; }
        .menu-item-info { padding: 16px; }
        .menu-item-name { font-size: 18px; font-weight: 700; }
        .menu-item-price { font-size: 20px; font-weight: 800; color: #667eea; }
        
        @media (max-width: 768px) {
            .sidebar { width: 0; transform: translateX(-100%); }
            .main-content { margin-left: 0; padding: 20px; }
            .status-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="/images/logo.png" alt="KheZwo" style="width: 40px; height: 40px; border-radius: 10px;" onerror="this.style.display='none'">
                <div class="logo">KheZwo<span>.</span></div>
            </div>
            <div class="business-name" id="businessName">Loading...</div>
        </div>
        <div class="nav-item active" data-tab="orders"><i class="fas fa-shopping-bag"></i><span>Live Orders</span></div>
        <div class="nav-item" data-tab="history"><i class="fas fa-history"></i><span>Order History</span></div>
        <div class="nav-item" data-tab="menu"><i class="fas fa-utensils"></i><span>Menu</span></div>
        <div class="nav-item" data-tab="profile"><i class="fas fa-store"></i><span>Profile</span></div>
        <div class="nav-item" data-tab="qr"><i class="fas fa-qrcode"></i><span>QR Code</span></div>
        <div class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div>
    </div>
    
    <div class="main-content">
        <div id="alert" class="alert"></div>
        
        <div id="orders-tab" class="tab-content active">
            <div class="page-header"><h1>Live Orders</h1><p>Update order status to keep customers informed</p></div>
            <div id="ordersList" class="orders-container">Loading orders...</div>
        </div>
        
        <div id="history-tab" class="tab-content">
            <div class="page-header"><h1>Order History</h1><p>View completed orders</p></div>
            <div id="historyList" class="orders-container">Loading...</div>
        </div>
        
        <div id="menu-tab" class="tab-content">
            <div class="page-header"><h1>Menu Management</h1></div>
            <div class="form-card" style="margin-bottom: 30px; background: white; border-radius: 20px; padding: 25px;">
                <h2>Add New Item</h2>
                <form id="addItemForm" enctype="multipart/form-data">
                    <div class="form-group"><label>Item Name</label><input type="text" id="itemName" required></div>
                    <div class="form-group"><label>Price (R)</label><input type="number" id="itemPrice" step="0.01" required></div>
                    <div class="form-group"><label>Description</label><textarea id="itemDescription" rows="3"></textarea></div>
                    <div class="form-group"><label>Photo</label><input type="file" id="itemPhoto" accept="image/*"></div>
                    <button type="submit" class="btn">Add Item</button>
                </form>
            </div>
            <div id="menuList" class="menu-grid">Loading...</div>
        </div>
        
        <div id="profile-tab" class="tab-content">
            <div class="page-header"><h1>Business Profile</h1></div>
            <div class="form-card" style="background: white; border-radius: 20px; padding: 25px;">
                <form id="profileForm" enctype="multipart/form-data">
                    <div class="form-group"><label>Business Name</label><input type="text" id="profileBusinessName"></div>
                    <div class="form-group"><label>Owner Name</label><input type="text" id="profileOwnerName"></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="profilePhone"></div>
                    <div class="form-group"><label>Address</label><input type="text" id="profileAddress"></div>
                    <div class="form-group"><label>Status</label><select id="profileIsOpen"><option value="1">Open</option><option value="0">Closed</option></select></div>
                    <div class="form-group"><label>Logo</label><input type="file" id="profileLogo" accept="image/*"></div>
                    <button type="submit" class="btn">Save Profile</button>
                </form>
            </div>
        </div>
        
        <div id="qr-tab" class="tab-content">
            <div class="page-header"><h1>QR Code</h1></div>
            <div class="form-card" style="background: white; border-radius: 20px; padding: 25px; text-align: center;">
                <div class="qr-container" id="qrContainer">Loading...</div>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                    <button onclick="downloadQR()" class="btn">Download QR</button>
                    <button onclick="regenerateQR()" class="btn" style="background: #4caf50;">Regenerate</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentVendor = null, currentMenu = [];
        
        function getStatusButtons(orderId, currentStatus) {
            const statuses = [
                { value: 'received', label: 'Received', icon: 'fa-check' },
                { value: 'preparing', label: 'Preparing', icon: 'fa-utensils' },
                { value: 'ready', label: 'Ready', icon: 'fa-bell' },
                { value: 'completed', label: 'Complete', icon: 'fa-check-double' }
            ];
            
            return statuses.map(s => `
                <button onclick="updateOrderStatus(${orderId}, '${s.value}')" 
                        class="status-btn ${currentStatus === s.value ? 'active' : ''}"
                        style="background: ${currentStatus === s.value ? '#4caf50' : '#e0e0e0'}; color: ${currentStatus === s.value ? 'white' : '#666'};">
                    <i class="fas ${s.icon}"></i> ${s.label}
                </button>
            `).join('');
        }
        
        async function updateOrderStatus(orderId, status) {
            try {
                const res = await fetch('/api/vendor/update-tracking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, status: status })
                });
                if (res.ok) {
                    showAlert(`Order status updated to ${status}!`, 'success');
                    loadData();
                    loadOrderHistory();
                } else {
                    showAlert('Failed to update status', 'error');
                }
            } catch (err) {
                showAlert('Network error', 'error');
            }
        }
        
        async function loadData() {
            try {
                const res = await fetch('/api/vendor/data');
                const data = await res.json();
                if (res.ok) {
                    currentVendor = data.vendor;
                    currentMenu = data.menu_items || [];
                    document.getElementById('businessName').innerHTML = data.vendor?.business_name || 'Business';
                    document.getElementById('profileBusinessName').value = data.vendor?.business_name || '';
                    document.getElementById('profileOwnerName').value = data.vendor?.owner_name || '';
                    document.getElementById('profilePhone').value = data.vendor?.phone || '';
                    document.getElementById('profileAddress').value = data.vendor?.address || '';
                    document.getElementById('profileIsOpen').value = data.vendor?.is_open || '1';
                    renderMenu();
                    renderOrders(data.orders || []);
                    loadOrderHistory();
                    loadQR();
                }
            } catch(err) { console.error(err); }
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            if (!orders || !orders.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><h3>No pending orders</h3></div>';
                return;
            }
            container.innerHTML = orders.map(order => {
                const items = typeof order.items_json === 'string' ? JSON.parse(order.items_json) : order.items_json;
                const currentStatus = order.status || 'pending';
                let displayStatus = currentStatus;
                if (currentStatus === 'pending') displayStatus = 'received';
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-number">Order #${order.order_number}</span>
                            <span class="order-time">${new Date(order.created_at).toLocaleString()}</span>
                        </div>
                        <div class="order-customer"><i class="fas fa-user"></i> ${escapeHtml(order.customer_name || 'Anonymous')}</div>
                        <div class="order-items">
                            ${items.map(item => `<div class="order-item"><span>${escapeHtml(item.name)}</span><span>R${(item.price * (item.quantity || 1)).toFixed(2)}</span></div>`).join('')}
                        </div>
                        <div class="order-total">Total: R${parseFloat(order.total).toFixed(2)}</div>
                        <div class="status-buttons">
                            ${getStatusButtons(order.id, displayStatus)}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderMenu() {
            const container = document.getElementById('menuList');
            if (!currentMenu.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-utensils"></i><h3>No menu items</h3></div>'; return; }
            container.innerHTML = currentMenu.map(item => `
                <div class="menu-item-card">
                    <div class="menu-item-image" style="background-image: url('${item.photo_url || 'https://via.placeholder.com/300x160?text=No+Image'}');"></div>
                    <div class="menu-item-info">
                        <div class="menu-item-name">${escapeHtml(item.name)}</div>
                        <div class="menu-item-price">R${parseFloat(item.price).toFixed(2)}</div>
                        <button onclick="toggleAvailability(${item.id}, ${item.is_available})" style="margin-top:12px; width:100%; padding:8px; border-radius:8px; border:1px solid #667eea; background:white; color:#667eea; cursor:pointer;">${item.is_available ? 'Mark Out of Stock' : 'Mark Available'}</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadOrderHistory() {
            const res = await fetch('/api/vendor/order-history');
            const history = await res.json();
            const container = document.getElementById('historyList');
            if (!history || !history.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-clock"></i><h3>No completed orders</h3></div>'; return; }
            container.innerHTML = history.map(order => `
                <div class="order-card">
                    <div class="order-header"><span class="order-number">Order #${order.order_number}</span><span class="order-time">${new Date(order.created_at).toLocaleString()}</span></div>
                    <div class="order-customer">${escapeHtml(order.customer_name || 'Anonymous')}</div>
                    <div class="order-total">Total: R${parseFloat(order.total).toFixed(2)}</div>
                </div>
            `).join('');
        }
        
        async function loadQR() { const res = await fetch('/api/vendor/qr-code'); const data = await res.json(); if (data.success) { document.getElementById('qrContainer').innerHTML = `<img id="qrImg" src="${data.qrBase64}" style="max-width:250px;">`; } }
        async function regenerateQR() { const res = await fetch('/api/vendor/regenerate-qr'); if (res.ok) { loadQR(); showAlert('QR regenerated!', 'success'); } }
        function downloadQR() { const img = document.getElementById('qrImg'); if (img) { const link = document.createElement('a'); link.download = 'qrcode.png'; link.href = img.src; link.click(); } }
        function logout() { window.location.href = '/vendor/logout'; }
        async function toggleAvailability(itemId, current) { await fetch('/api/vendor/toggle-availability', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ item_id: itemId, is_available: current ? 0 : 1 }) }); loadData(); }
        
        document.getElementById('addItemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('name', document.getElementById('itemName').value);
            fd.append('price', document.getElementById('itemPrice').value);
            fd.append('description', document.getElementById('itemDescription').value);
            const photo = document.getElementById('itemPhoto').files[0];
            if (photo) fd.append('photo', photo);
            await fetch('/api/vendor/add-menu-item', { method: 'POST', body: fd });
            document.getElementById('addItemForm').reset();
            loadData();
            showAlert('Item added!', 'success');
        });
        
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('business_name', document.getElementById('profileBusinessName').value);
            fd.append('owner_name', document.getElementById('profileOwnerName').value);
            fd.append('phone', document.getElementById('profilePhone').value);
            fd.append('address', document.getElementById('profileAddress').value);
            fd.append('is_open', document.getElementById('profileIsOpen').value);
            const logo = document.getElementById('profileLogo').files[0];
            if (logo) fd.append('logo', logo);
            await fetch('/api/vendor/update-profile', { method: 'POST', body: fd });
            showAlert('Profile updated!', 'success');
            loadData();
        });
        
        function showAlert(msg, type) { const alert = document.getElementById('alert'); alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`; alert.className = `alert alert-${type}`; alert.style.display = 'block'; setTimeout(() => alert.style.display = 'none', 3000); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
        
        document.querySelectorAll('.nav-item').forEach(nav => { nav.addEventListener('click', () => { const tabName = nav.dataset.tab; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); nav.classList.add('active'); document.getElementById(`${tabName}-tab`).classList.add('active'); if (tabName === 'history') loadOrderHistory(); if (tabName === 'qr') loadQR(); }); });
        
        loadData();
        setInterval(() => { if (document.querySelector('.nav-item.active').dataset.tab === 'orders') loadData(); }, 10000);
    </script>
</body>
</html>
