<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Database - KheZwo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }
        .success { color: #2e7d32; background: #e8f5e9; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .error { color: #c33; background: #fee; padding: 15px; border-radius: 12px; margin: 15px 0; }
        pre { text-align: left; background: #f5f5f5; padding: 10px; border-radius: 8px; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔧 Database Setup</h1>
        <p>Click the button below to create all required tables:</p>
        <ul style="text-align: left; margin: 20px 0;">
            <li>✓ audit_logs</li>
            <li>✓ order_tracking</li>
            <li>✓ business_types</li>
            <li>✓ subscription_plans</li>
        </ul>
        <button onclick="setupTables()">Create Tables</button>
        <div id="result"></div>
    </div>

    <script>
        async function setupTables() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="success">Processing...</div>';
            
            try {
                const response = await fetch('/api/setup-tables');
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<div class="success">✅ ${data.message}</div><pre>${data.details || ''}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
