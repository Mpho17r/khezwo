<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Menu - KheZwo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; padding-bottom: 80px; }
        .vendor-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; }
        .vendor-logo { width: 80px; height: 80px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; overflow: hidden; }
        .vendor-name { font-size: 24px; font-weight: bold; }
        .menu-section { max-width: 600px; margin: 0 auto; padding: 20px; }
        .menu-item { background: white; border-radius: 16px; margin-bottom: 16px; padding: 16px; display: flex; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .menu-item-image { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .menu-item-info { flex: 1; }
        .menu-item-name { font-size: 18px; font-weight: 600; }
        .menu-item-price { font-size: 18px; font-weight: bold; color: #667eea; margin-top: 5px; }
        .add-to-cart { background: #667eea; color: white; border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; margin-top: 10px; }
        .cart-toggle { position: fixed; bottom: 20px; right: 20px; background: #667eea; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; border: none; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: #ff5722; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .cart-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 25px 25px 0 0; padding: 20px; transform: translateY(100%); transition: transform 0.3s; z-index: 200; max-height: 70vh; overflow-y: auto; }
        .cart-panel.open { transform: translateY(0); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-total { padding: 15px 0; font-size: 18px; font-weight: bold; text-align: right; }
        .checkout-btn { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; width: 90%; max-width: 350px; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; }
        .loading { text-align: center; padding: 50px; color: #999; }
        .watermark { text-align: center; padding: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div id="app"><div class="loading">Loading menu...</div></div>
    <script>
        let vendorData = null;
        let menuItems = [];
        let cart = [];
        let vendorId = null;
        
        vendorId = window.location.pathname.split('/')[2];
        
        async function loadMenu() {
            try {
                const res = await fetch(`/api/menu/${vendorId}`);
                const data = await res.json();
                if (res.ok) {
                    vendorData = data.vendor;
                    menuItems = data.menu_items;
                    render();
                } else {
                    document.getElementById('app').innerHTML = '<div class="loading">Vendor not found</div>';
                }
            } catch(err) {
                document.getElementById('app').innerHTML = '<div class="loading">Error loading menu</div>';
            }
        }
        
        function render() {
            document.getElementById('app').innerHTML = `
                <div class="vendor-header">
                    <div class="vendor-logo">${vendorData.logo_url ? `<img src="${vendorData.logo_url}" style="width:100%;height:100%;object-fit:cover;">` : '<div style="font-size:40px;">🏪</div>'}</div>
                    <div class="vendor-name">${escapeHtml(vendorData.business_name)}</div>
                </div>
                <div class="menu-section" id="menuList"></div>
                <div class="watermark">Powered by KheZwo ⚡</div>
                <button class="cart-toggle" onclick="toggleCart()">🛒<span id="cartBadge" class="cart-count" style="display:none;">0</span></button>
                <div class="cart-panel" id="cartPanel">
                    <div class="cart-header"><h3>Your Order</h3><button onclick="toggleCart()" style="background:none;border:none;font-size:24px;">✕</button></div>
                    <div id="cartItems"></div>
                </div>
                <div class="modal" id="checkoutModal">
                    <div class="modal-content">
                        <h3>Complete Your Order</h3>
                        <input type="text" id="customerName" placeholder="Your name" required>
                        <input type="tel" id="customerPhone" placeholder="Phone number">
                        <select id="paymentMethod"><option value="cash">Cash</option><option value="card">Card</option></select>
                        <button onclick="submitOrder()" style="background:#667eea;color:white;border:none;padding:12px;border-radius:25px;width:100%;margin-top:10px;">Place Order</button>
                        <button onclick="closeModal()" style="background:#ccc;border:none;padding:10px;border-radius:25px;width:100%;margin-top:10px;">Cancel</button>
                    </div>
                </div>
            `;
            
            const menuContainer = document.getElementById('menuList');
            menuContainer.innerHTML = menuItems.map(item => `
                <div class="menu-item">
                    ${item.photo_url ? `<img class="menu-item-image" src="${item.photo_url}">` : '<div class="menu-item-image" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:40px;">🍽️</div>'}
                    <div class="menu-item-info">
                        <div class="menu-item-name">${escapeHtml(item.name)}</div>
                        <div class="menu-item-price">R${parseFloat(item.price).toFixed(2)}</div>
                        <button class="add-to-cart" onclick="addToCart(${item.id}, '${escapeHtml(item.name).replace(/'/g, "\\'")}', ${item.price})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
            renderCart();
        }
        
        function addToCart(id, name, price) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.quantity++;
            else cart.push({ id, name, price, quantity: 1 });
            updateCartUI();
        }
        
        function removeFromCart(id) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx !== -1) {
                if (cart[idx].quantity > 1) cart[idx].quantity--;
                else cart.splice(idx, 1);
            }
            updateCartUI();
        }
        
        function getCartCount() {
            return cart.reduce((s, i) => s + i.quantity, 0);
        }
        
        function updateCartUI() {
            renderCart();
            const count = getCartCount();
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            }
        }
        
        function renderCart() {
            const container = document.getElementById('cartItems');
            if (!container) return;
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">Your cart is empty</div>';
                return;
            }
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            container.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <div><strong>${escapeHtml(i.name)}</strong><br>R${i.price.toFixed(2)} x ${i.quantity}</div>
                    <div>
                        <button onclick="removeFromCart(${i.id})" style="background:#fee;border:none;padding:5px 10px;border-radius:5px;">−</button>
                        <span style="margin:0 10px;">${i.quantity}</span>
                        <button onclick="addToCart(${i.id}, '${escapeHtml(i.name).replace(/'/g, "\\'")}', ${i.price})" style="background:#e8f5e9;border:none;padding:5px 10px;border-radius:5px;">+</button>
                    </div>
                </div>
            `).join('') + `<div class="cart-total">Total: R${total.toFixed(2)}</div>
            <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout →</button>`;
        }
        
        function toggleCart() { document.getElementById('cartPanel').classList.toggle('open'); }
        function openCheckout() { if (cart.length === 0) { alert('Cart empty'); return; } document.getElementById('checkoutModal').style.display = 'flex'; toggleCart(); }
        function closeModal() { document.getElementById('checkoutModal').style.display = 'none'; }
        
        async function submitOrder() {
            const customerName = document.getElementById('customerName').value;
            const customerPhone = document.getElementById('customerPhone').value;
            const paymentMethod = document.getElementById('paymentMethod').value;
            if (!customerName) { alert('Enter your name'); return; }
            
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const items = cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity }));
            
            try {
                const res = await fetch('/api/place-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vendor_id: parseInt(vendorId),
                        customer_name: customerName,
                        customer_phone: customerPhone,
                        items: items,
                        total: total,
                        payment_method: paymentMethod
                    })
                });
                const data = await res.json();
                console.log('Order response:', data);
                if (res.ok && data.success) {
                    alert(`✅ Order placed!\n\nOrder #: ${data.order_number}\nTotal: R${total.toFixed(2)}\n\nPlease take a screenshot.`);
                    cart = [];
                    updateCartUI();
                    closeModal();
                    if (document.getElementById('cartPanel').classList.contains('open')) toggleCart();
                } else {
                    alert('Error: ' + (data.error || 'Unknown'));
                }
            } catch(err) {
                console.error('Order error:', err);
                alert('Network error. Please try again.');
            }
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
        loadMenu();
    </script>
</body>
</html>
